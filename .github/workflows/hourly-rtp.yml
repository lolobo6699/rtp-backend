name: 每小時 RTP 推播

on:
  # schedule 已停用：GitHub Actions 排程延遲 30-60 分鐘不穩定
  # 改由 cron-job.org 外部觸發，準時且可靠
  workflow_dispatch:        # 保留手動觸發（測試用）

jobs:
  trigger-rtp-cron:
    runs-on: ubuntu-latest
    steps:
      - name: 呼叫 Vercel cron 端點
        run: |
          curl -s -X POST https://rtp-wffq.vercel.app/api/cron \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --fail-with-body
